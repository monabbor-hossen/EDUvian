name: eduvian
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.7.2
  flutter_riverpod: ^2.6.1
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.4
  google_sign_in: ^6.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.2.3
  cloud_firestore: ^5.6.6
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^22.0.1
  http: ^1.6.0
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons:
  flutter_native_splash:

flutter_icons:
  android: true
  ios: true
  image_path_android: "assets/icon/EDUvian-Icon.png"
  image_path_ios: "assets/icon/EDUvian-Icon.png"

  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#ffffff" # Background color
  image: assets/icon/EDUvian-Icon.png
  android: true
  ios: true
  fullscreen: true
flutter:
  uses-material-design: true

  assets:
    - assets/icon/EDUvian-Icon.png
    - assets/eduvian-9c08e-firebase-adminsdk-fbsvc-a70028ce91.json
